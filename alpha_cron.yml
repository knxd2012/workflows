name: Alpha Sniper T-1H Auto Runner

on:
  schedule:
    - cron: '0 * * * *'        # 依然保留 GitHub 自帶的每小時自動保底
  workflow_dispatch:          # 保留網頁手動點擊按鈕
  repository_dispatch:        # 👈 核心新增：允許你的 Discord Bot 透過 API 遠端踢醒它
    types: [discord_trigger]

jobs:
  run-robot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 🛠️ 安裝微軟官方 Playwright 自動化瀏覽器核心
    - name: Install Dependencies & Playwright
      run: |
        pip install playwright
        playwright install chromium

    # 🎯 執行自動點擊預測與 Discord 發佈
    - name: Execute Cloud Robot
      run: python cloud_robot.py
